<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Server Files</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <style>
        * {
            font-size: small;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: #101010 url(bmaphp-wallpaper.jpg) ;
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            transition: backdrop-filter ease 1s;
        }

        .blur {
            backdrop-filter: blur(10px);
            transition: backdrop-filter ease 1s;
        }

        .bg-header {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(0px);
            transition: backdrop-filter ease 1s;
        }
    </style>
</head>

<body class="vh-100 d-flex flex-column position-relative">
    <header class="sticky-top px-3 pt-3 bg-header z-2">
        <div class="py-2 d-flex gap-2 flex-row align-items-center container-xl">
            <span class="text-light p-0 align-items-center fs-4">Index of: </span>
            <div class="badge bg-success fs-6" id="dirlabel">.</div>
        </div>
    </header>
    <main class="d-flex flex-wrap p-3 p-xl-0 py-xl-3 overflow-y-auto gap-3">
        <div class="d-flex flex-column gap-2 col-12 container-xl overflow-y-auto" id="pool">
            <div class="card bg-header text-white border-0 blur">
                <div class="card-header btn border-0 p-2 d-flex justify-content-between align-items-center flex-row gap-2 c"
                    location="">
                    <div class="d-flex flex-row justify-content-start gap-2 text-truncate placeholder-glow">
                        <span class="material-symbols-outlined fs-4 placeholer">square</span>
                        <span class="align-middle placeholder">Lorem ipsum dolor sit amet consectetur, adipisicing elit.</span>
                    </div>
                    <div
                        class="d-flex flex-row gap-3 flex-shrink-0 justify-content-end justify-content-sm-between col-2 col-sm-5 col-lg-4 col-xl-3 placeholder-glow">
                        <div class="d-none d-sm-block col-4 placeholder">6/5/2026</div>
                        <div class="d-none d-sm-block col-4 placeholder">4:44:07 PM</div>
                        <div class="col-3 flex-grow-1 d-flex justify-content-end placeholder">65.23 MB</div>
                    </div>
                </div>
                <div class="card-body d-none px-2 pb-1 pt-2 border-top code card-file-body">Loading...</div>
            </div>
        </div>
    </main>
    <div class="d-flex justify-content-center align-items-center position-absolute top-50 start-50 translate-middle"
        id="spinner">
        <div class="spinner-border text-primary spinner-border-xxl" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
    </div>
    <div class="position-absolute top-0 start-0 vw-100 vh-100 z-3 d-none"
        style="background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(10px);">
        <div class="card position-absolute top-50 start-50 translate-middle bg-header text-white z-3"
            style="width: 100vw; max-width: 75vw; max-height: 75vh; aspect-ratio:  16/9;">
            <div class="card-header">
                Hello
            </div>
        </div>
    </div>
    <script>
        let poolstack = [];
        let pool = document.getElementById("pool");
        let current;

        pool.addEventListener("mouseover", () => {
            for (let e of document.getElementsByClassName("bg-header")) {
                e.classList.remove("blur");
            }
            document.querySelector("body").classList.add("blur");
        });

        pool.addEventListener("mouseleave", () => {
            for (let e of document.getElementsByClassName("bg-header")) {
                e.classList.add("blur");
            }
            document.querySelector("body").classList.remove("blur");
        });

        function readifyFileSize(bytes) {
            let disp_size = bytes;
            let disp_unit = " Bytes";

            if (bytes >= 1024 && bytes < 1024 ** 2) {
                disp_size /= 1024;
                disp_unit = " KB";
            } else if (bytes >= 1024 ** 2 && bytes < 1024 ** 3) {
                disp_size /= 1024 ** 2;
                disp_unit = " MB";
            } else if (bytes >= 1024 ** 3) {
                disp_size /= 1024 ** 3;
                disp_unit = " GB";
            }
            return disp_size.toFixed(2) + disp_unit;
        }

        function pushNameToDirectoryLabel(name) {
            let current = document.getElementById("dirlabel").innerText.split("/");
            current.push(name);
            document.getElementById("dirlabel").innerText = current.join("/");
        }

        function popNameFromDirectoryLabel() {
            let current = document.getElementById("dirlabel").innerText.split("/");
            let ret = current.pop(name);
            document.getElementById("dirlabel").innerText = current.join("/");
            return ret;
        }

        function createItemElement(key = null) {
            let e = {
                "card": document.createElement("div"),

                "card_head": document.createElement("div"),
                "icon": document.createElement("span"),
                "name": document.createElement("span"),
                "left_group": document.createElement("div"),

                "card_body": document.createElement("div"),

                "date": document.createElement("div"),
                "time": document.createElement("div"),
                "size": document.createElement("div"),
                "right_group": document.createElement("div")

            };

            e.card.classList.add("card", "bg-header", "text-white", "border-0");

            e.card_head.classList.add("card-header", "btn", "border-0", "p-2", "d-flex", "justify-content-between", "align-items-center", "flex-row", "gap-2", "c");
            e.icon.classList.add("material-symbols-outlined", "fs-4");
            e.name.classList.add("align-middle");
            e.left_group.classList.add("d-flex", "flex-row", "justify-content-start", "gap-2", "text-truncate");

            e.card_body.classList.add("card-body", "d-none", "px-2", "pb-1", "pt-2", "border-top", "code");

            e.date.classList.add("d-none", "d-sm-block", "col-4");
            e.time.classList.add("d-none", "d-sm-block", "col-4");
            e.size.classList.add("col-3", "flex-grow-1", "d-flex", "justify-content-end");
            e.right_group.classList.add("d-flex", "flex-row", "gap-3", "flex-shrink-0", "justify-content-end", "justify-content-sm-between", "col-2", "col-sm-5", "col-lg-4", "col-xl-3");

            if (key == null) {
                if (poolstack.length !== 0) {
                    e.icon.innerText = "arrow_back";
                    e.name.innerText = "Parent Directory";
                    e.card.addEventListener("click", () => {
                        popNameFromDirectoryLabel();
                        pool.innerHTML = null;
                        current = poolstack.pop();
                        renderPool(current);
                    });
                } else {
                    return null;
                }
            } else {
                if (key[1].item_type == "file") {
                    e.card_head.setAttribute("location", key[1].file_url)
                    e.size.innerText = `${readifyFileSize(key[1].file_size)}`;
                    e.date.innerText = new Date(key[1].file_time * 1000).toLocaleDateString();
                    e.time.innerText = new Date(key[1].file_time * 1000).toLocaleTimeString();
                    e.card_body.classList.add("card-file-body");
                    e.card_head.addEventListener("click", () => {
                        console.log(key[1].file_mime);
                        if (e.card_body.classList.contains("d-none")) {
                            // e.card.style.maxHeight = 100 + "px";
                            for (let el of document.getElementsByClassName("card-file-body")) {
                                el.classList.add("d-none");
                                el.innerText = "";
                            }
                            e.card_body.innerText = "";

                            let embed = document.createElement("embed");
                            switch (key[1].file_mime) {
                                case "video/mp4":
                                    embed = document.createElement("video");
                                    embed.src = key[1].file_url;
                                    embed.setAttribute("controls", "");
                                    break;
                                case "text/plain":
                                    embed = document.createElement("pre");
                                    embed.classList.add("ms-auto");
                                    // embed.setAttribute("readonly", "");
                                    fetch(key[1].file_url).then(resp => resp.text()).then(data => {
                                        for (let bunch of data.split('\n')) {
                                            let codeBunch = document.createElement("code");
                                            codeBunch.innerText = bunch;
                                            embed.appendChild(codeBunch);
                                        }
                                    }
                                    );
                                    break;
                                case "audio/mpeg":
                                    embed = document.createElement("audio");
                                    embed.setAttribute("controls", "");
                                    embed.setAttribute("autoplay", "");
                                    let source = document.createElement("source");
                                    source.src = key[1].file_url
                                    embed.appendChild(source);
                                    break;
                                default:
                                    embed.src = key[1].file_url;

                            }

                            embed.classList.add("w-100", "rounded-3", "d-block");
                            embed.style.aspectRatio = "16 / 9";
                            e.embed = embed;

                            e.card_body.append(e.embed);
                        } else {
                            e.card_body.innerText = "";
                        }
                        e.card_body.classList.toggle("d-none");
                    });
                    e.card_body.innerText = "Loading...";
                } else {
                    e.card.addEventListener("click", () => {
                        pushNameToDirectoryLabel(key[0]);
                        poolstack.push(current);
                        current = key[1].child;
                        console.log(poolstack);
                        renderPool(key[1].child);
                    });
                }
                e.icon.innerText = (key[1].item_type == "folder") ? "folder" : getIconByFileExt(key[0].split(".").pop());
                e.name.innerText = key[0];
            }

            e.left_group.append(e.icon, e.name);
            e.right_group.append(e.date, e.time, e.size);
            e.card_head.append(e.left_group, e.right_group);
            e.card.append(e.card_head);
            if (key != null && key[1].item_type == "file") {
                e.card.append(e.card_body);
            }
            return e.card;
        }

        function renderPool(child) {
            let pool = document.getElementById("pool");
            pool.innerHTML = null;
            let returnkey = createItemElement();
            if (returnkey != null) pool.appendChild(returnkey);

            Object.entries(child).forEach((key, value) => {
                pool.appendChild(createItemElement(key));
            });
        }

        
        pool.innerHTML = null;
        for (let i = 0; i < 12; i++) {
            // console.log(createItemElement([1, 1]));
            // pool.appendChild();
        }

        fetch("api.php")
            .then(response => response.json())
            .then(data => {
                document.getElementById("spinner").classList.add("d-none");
                current = data;
                console.log(poolstack);
                Object.entries(data).forEach((key, value) => {
                    document.getElementById("pool").appendChild(createItemElement(key));
                });
            });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
